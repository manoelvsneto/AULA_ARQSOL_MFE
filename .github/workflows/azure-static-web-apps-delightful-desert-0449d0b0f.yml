name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Cache node_modules (acelera builds subsequentes) ─────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            mfe-cadastro/node_modules
            mfe-leilao/node_modules
            shell/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('mfe-cadastro/package-lock.json','mfe-leilao/package-lock.json','shell/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ── 1 + 2. Build MFEs em paralelo (economiza ~40-60s) ────────────────────
      - name: Build mfe-cadastro e mfe-leilao (paralelo)
        run: |
          (npm ci --prefer-offline --no-audit --no-fund --prefix mfe-cadastro && npm run build --prefix mfe-cadastro) &
          PID_CADASTRO=$!
          (npm ci --prefer-offline --no-audit --no-fund --prefix mfe-leilao  && npm run build --prefix mfe-leilao)  &
          PID_LEILAO=$!
          wait $PID_CADASTRO || { echo "mfe-cadastro falhou"; exit 1; }
          wait $PID_LEILAO   || { echo "mfe-leilao falhou";   exit 1; }

      # ── 3. Copiar APENAS arquivos de federação (sem shared singletons) ────────
      #    __federation_shared_* NÃO são copiados: o Shell os fornece em runtime
      #    Isso elimina ~2MB de @mui/material duplicado do upload
      - name: Copy MFE federation assets into shell/public
        run: |
          mkdir -p shell/public/mfe-cadastro/assets
          find mfe-cadastro/dist/assets -maxdepth 1 -type f \
            ! -name '__federation_shared_*' \
            -exec cp {} shell/public/mfe-cadastro/assets/ \;

          mkdir -p shell/public/mfe-leilao/assets
          find mfe-leilao/dist/assets -maxdepth 1 -type f \
            ! -name '__federation_shared_*' \
            -exec cp {} shell/public/mfe-leilao/assets/ \;

          echo "=== Arquivos copiados para shell/public ==="
          find shell/public -type f | sort

      # ── 4. Build shell (production mode → URLs relativas dos MFEs) ───────────
      - name: Build shell
        run: |
          npm ci --prefer-offline --no-audit --no-fund --prefix shell
          npm run build --prefix shell

      # ── 5. Deploy shell/dist → Azure Static Web Apps ─────────────────────────
      # app_location aponta DIRETO para os artefatos buildados (shell/dist),
      # evitando que o container varra node_modules ou outros arquivos grandes.
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        timeout-minutes: 15
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_DESERT_0449D0B0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "shell/dist"
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_DESERT_0449D0B0F }}
          action: "close"
